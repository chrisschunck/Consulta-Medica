<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Pacientes</title>
<link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<header><h1>Pacientes</h1><nav>
    <a th:href="@{/}">Início</a> |
    <a th:href="@{/pacientes}">Pacientes</a> |
    <a th:href="@{/medicos}">Médicos</a> |
    <a th:href="@{/consultorios}">Consultórios</a> |
    <a th:href="@{/convenios}">Convênios</a> |
    <a th:href="@{/agendamentos}">Agendamentos</a> |
    <span th:if="${session.USUARIO_NOME != null}">
        Olá, <strong th:text="${session.USUARIO_NOME}"></strong>
        (<span th:text="${session.USUARIO_ROLE}"></span>)
    </span> |
    <a th:href="@{/auth/logout-web}" style="color:red">Sair</a>
</nav></header><hr/>
<h2>Novo Paciente</h2>
<form th:action="@{/pacientes}" th:object="${paciente}" method="post">
    <div><label>Nome:</label><input type="text" th:field="*{nome}"/>
    <span style="color:red" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span></div>
    <br>
    <div><label>Idade:</label><input type="number" th:field="*{idade}"/>
    <span style="color:red" th:if="${#fields.hasErrors('idade')}" th:errors="*{idade}"></span></div>
    <br>
    <div><label>Email:</label><input type="email" th:field="*{email}"/>
    <span style="color:red" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span></div>
    <br>
    <div><label>CPF:</label><input type="text" th:field="*{cpf}"/>
    <span style="color:red" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></span></div>
    <br>
    <div><label>Contato:</label><input type="text" th:field="*{contato}"/>
    <span style="color:red" th:if="${#fields.hasErrors('contato')}" th:errors="*{contato}"></span></div>
    <button type="submit">Salvar</button>
</form><hr/>
<h2>Lista de Pacientes</h2>
<table border="1" cellpadding="6"><thead><tr>
    <th>ID</th><th>Nome</th><th>Idade</th><th>Email</th><th>CPF</th><th>Contato</th>
</tr></thead><tbody>
<tr th:each="p : ${pacientes}">
    <td th:text="${p.id}"></td><td th:text="${p.nome}"></td><td th:text="${p.idade}"></td>
    <td th:text="${p.email}"></td><td th:text="${p.cpf}"></td><td th:text="${p.contato}"></td>
</tr></tbody></table>
</body></html>
