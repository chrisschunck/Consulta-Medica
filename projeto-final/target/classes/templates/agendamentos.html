<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Agendamentos</title>
<link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<header><h1>Agendamentos</h1><nav>
    <a th:href="@{/}">Início</a> |
    <a th:href="@{/pacientes}">Pacientes</a> |
    <a th:href="@{/medicos}">Médicos</a> |
    <a th:href="@{/consultorios}">Consultórios</a> |
    <a th:href="@{/convenios}">Convênios</a> |
    <a th:href="@{/agendamentos}">Agendamentos</a> |
    <span th:if="${session.USUARIO_NOME != null}">
        Olá, <strong th:text="${session.USUARIO_NOME}"></strong>
        (<span th:text="${session.USUARIO_ROLE}"></span>)
    </span> |
    <a th:href="@{/auth/logout-web}" style="color:red">Sair</a>
</nav></header><hr/>
<h2>Novo Agendamento</h2>
<p th:if="${#lists.isEmpty(medicos) or #lists.isEmpty(pacientes) or #lists.isEmpty(consultorios)}"
   style="color:red">Cadastre ao menos um médico, um paciente e um consultório antes de agendar.</p>
<form th:action="@{/agendamentos}" method="post">
    <div><label>Médico:</label>
    <select name="medicoId" required><option value="">Selecione</option>
    <option th:each="m : ${medicos}" th:value="${m.id}" th:text="${m.nome + ' - ' + m.crm}"></option></select></div><br>
    <br>
    <div><label>Paciente:</label>
    <select name="pacienteId" required><option value="">Selecione</option>
    <option th:each="p : ${pacientes}" th:value="${p.id}" th:text="${p.nome + ' - ' + p.cpf}"></option></select></div><br>
    <br>
    <div><label>Consultório:</label>
    <select name="consultorioId" required><option value="">Selecione</option>
    <option th:each="c : ${consultorios}" th:value="${c.id}" th:text="${c.nome + ' - ' + c.local}"></option></select></div><br>
    <br>
    <div><label>Convênio (opcional):</label>
    <select name="convenioId"><option value="">Nenhum</option>
    <option th:each="cv : ${convenios}" th:value="${cv.id}" th:text="${cv.marca + ' - ' + cv.plano}"></option></select></div>
    <div><label>Horário:</label><input type="datetime-local" name="horarioAgendado" required/></div>
    <div><label>Descrição:</label><input type="text" name="descricao" required/></div>
    <button type="submit">Salvar</button>
</form><hr/>
<h2>Lista de Agendamentos</h2>
<table border="1" cellpadding="6"><thead><tr>
    <th>ID</th><th>Médico</th><th>Paciente</th><th>Convênio</th><th>Horário</th><th>Consultório</th><th>Descrição</th>
</tr></thead><tbody>
<tr th:each="a : ${agendamentos}">
    <td th:text="${a.id}"></td>
    <td th:text="${a.medico != null ? a.medico.nome : ''}"></td>
    <td th:text="${a.paciente != null ? a.paciente.nome : ''}"></td>
    <td th:text="${a.convenioMedico != null ? a.convenioMedico.marca : '-'}"></td>
    <td th:text="${a.horarioAgendado}"></td>
    <td th:text="${a.consultorio != null ? a.consultorio.nome : ''}"></td>
    <td th:text="${a.descricao}"></td>
</tr></tbody></table>
</body></html>
