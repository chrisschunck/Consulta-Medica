<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - Agendamento Médico</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="login-container">
    <h1>Sistema de Agendamento Médico</h1>
    <h2>Criar Conta</h2>

    <div th:if="${erro}" style="color:red; margin-bottom:10px;">
        <p th:text="${erro}"></p>
    </div>

    <form action="/auth/registro-web" method="post">
        <div>
            <label>Nome:</label>
            <input type="text" name="nome" required placeholder="Seu nome completo"/>
        </div>
        <div>
            <label>Email:</label>
            <input type="email" name="email" required placeholder="seu@email.com"/>
        </div>
        <div>
            <label>Senha:</label>
            <input type="password" name="senha" required placeholder="Mínimo 6 caracteres"/>
        </div>
        <div>
            <label>Perfil:</label>
            <select name="role">
                <option value="RECEPCIONISTA">Recepcionista</option>
                <option value="MEDICO">Médico</option>
                <option value="ADMIN">Administrador</option>
            </select>
        </div>
        <button type="submit">Cadastrar</button>
    </form>

    <p>Já tem conta? <a th:href="@{/login}">Faça login aqui</a></p>
</div>

</body>
</html>
